<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عاجل نيوز</title>

    <!-- Default Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="عاجل نيوز">
    <meta property="og:locale" content="ar_SA">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 50'><rect width='120' height='50' rx='6' fill='%23d71920'/><text x='60' y='36' text-anchor='middle' fill='white' font-size='32' font-weight='900'>عاجل</text></svg>">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Kufi Arabic', 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a1a; }
        .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
        .loading .spinner { width: 40px; height: 40px; border: 4px solid #eef0f2; border-top-color: #d71920; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <script>
    (async function() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const type = params.get('type') || 'article';

        if (!id) {
            window.location.href = '/Tae/';
            return;
        }

        try {
            // Fetch article data
            const endpoint = type === 'opinion' ? '/Tae/data/news.json' : '/Tae/data/news.json';
            const data = await fetch(endpoint).then(r => r.json());
            const article = data.articles.find(a => a.id == id || a.id === id);

            if (!article) {
                window.location.href = '/Tae/';
                return;
            }

            // Update meta tags
            const title = article.title + ' — عاجل نيوز';
            const description = (article.summary || article.title).substring(0, 160);
            const image = article.image ? 'https://images.weserv.nl/?url=' + encodeURIComponent(article.image) : '';
            const url = 'https://mimer2024yemen.github.io/Tae/?id=' + id;

            document.title = title;

            // Set Open Graph
            setMeta('og:title', title);
            setMeta('og:description', description);
            setMeta('og:url', url);
            if (image) {
                setMeta('og:image', image);
                setMeta('og:image:width', '1200');
                setMeta('og:image:height', '630');
                setMeta('og:image:type', 'image/jpeg');
            }

            // Set Twitter Card
            setMeta('twitter:title', title);
            setMeta('twitter:description', description);
            if (image) setMeta('twitter:image', image);

            // Set canonical
            const canonical = document.createElement('link');
            canonical.rel = 'canonical';
            canonical.href = url;
            document.head.appendChild(canonical);

            // Redirect to main page after a short delay
            setTimeout(() => {
                window.location.href = '/Tae/?id=' + id;
            }, 100);

        } catch (err) {
            window.location.href = '/Tae/';
        }

        function setMeta(property, content) {
            let meta = document.querySelector(`meta[property="${property}"]`) || document.querySelector(`meta[name="${property}"]`);
            if (!meta) {
                meta = document.createElement('meta');
                if (property.startsWith('twitter:')) meta.name = property;
                else meta.setAttribute('property', property);
                document.head.appendChild(meta);
            }
            meta.setAttribute('content', content);
        }
    })();
    </script>
</body>
</html>
