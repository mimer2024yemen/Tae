<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عاجل — الصفحة غير موجودة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 80px; color: #d71920; margin: 0; }
        h2 { font-size: 24px; color: #333; margin: 15px 0; }
        p { color: #888; font-size: 16px; margin-bottom: 25px; }
        a { display: inline-block; background: #d71920; color: #fff; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: 700; }
        a:hover { background: #b01518; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>الصفحة غير موجودة</h2>
        <p>ربما تم حذف هذه الصفحة أو أن الرابط غير صحيح</p>
        <a href="/Tae/">العودة للرئيسية</a>
    </div>
    <script>
        // GitHub Pages SPA routing
        const path = window.location.pathname.replace('/Tae/', '').replace(/\/$/, '');
        const sectionMap = {
            'local': 'local', 'economy': 'economy', 'sports': 'sports',
            'international': 'international', 'jobs': 'jobs', 'entertainment': 'entertainment',
            'misc': 'misc', 'tourism': 'tourism', 'society': 'society', 'worldcup': 'worldcup',
            'opinion': 'opinion', 'latest-news': 'latest-news',
        };

        if (sectionMap[path]) {
            window.location.href = '/Tae/?section=' + path;
        } else if (path.startsWith('article/')) {
            const id = path.split('/')[1];
            window.location.href = '/Tae/?id=' + id;
        } else if (path.startsWith('opinion/')) {
            const id = path.split('/')[1];
            window.location.href = '/Tae/?id=' + id + '&type=opinion';
        }
    </script>
</body>
</html>
