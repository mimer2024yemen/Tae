name: Fetch Latest News

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser cheerio

      - name: Fetch news
        run: node .github/scripts/fetch-news.js
        env:
          NODE_ENV: production

      - name: Commit and push
        run: |
          git config user.name "عاجل بوت"
          git config user.email "bot@ajel.sa"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No new articles"
          else
            git commit -m "تحديث الأخبار - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
